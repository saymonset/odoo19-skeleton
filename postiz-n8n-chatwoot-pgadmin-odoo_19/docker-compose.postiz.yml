services:
  # --------------------------------------------
  # Postiz App (usa BD y Redis compartidos)
  # --------------------------------------------
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:v2.21.6
    container_name: postiz
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      MAIN_URL: '${MAIN_URL:-https://postiz.integraia.lat}'
      FRONTEND_URL: '${FRONTEND_URL:-https://postiz.integraia.lat}'
      NEXT_PUBLIC_BACKEND_URL: '${FRONTEND_URL:-https://postiz.integraia.lat}/api'
      JWT_SECRET: '${JWT_SECRET:-pon_aqui_un_secreto_muy_largo_y_aleatorio}'
      DATABASE_URL: 'postgresql://odoo:${POSTGRES_PASSWORD}@db:5432/postiz?sslmode=disable'
      REDIS_URL: 'redis://:${REDIS_PASSWORD:-redis123}@redis:6379'
      BACKEND_INTERNAL_URL: 'http://postiz:3000'
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: 'false'
      RUN_CRON: 'true'
      STORAGE_PROVIDER: 'local'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'
      X_API_KEY: '${X_API_KEY:-}'
      X_API_SECRET: '${X_API_SECRET:-}'
      INSTAGRAM_APP_ID: '${INSTAGRAM_APP_ID:-}'
      INSTAGRAM_APP_SECRET: '${INSTAGRAM_APP_SECRET:-}'
      FACEBOOK_APP_ID: '${FACEBOOK_APP_ID:-}'
      FACEBOOK_APP_SECRET: '${FACEBOOK_APP_SECRET:-}'
      LINKEDIN_CLIENT_ID: '${LINKEDIN_CLIENT_ID:-}'
      LINKEDIN_CLIENT_SECRET: '${LINKEDIN_CLIENT_SECRET:-}'
      REDDIT_CLIENT_ID: '${REDDIT_CLIENT_ID:-}'
      REDDIT_CLIENT_SECRET: '${REDDIT_CLIENT_SECRET:-}'
      GITHUB_CLIENT_ID: '${GITHUB_CLIENT_ID:-}'
      GITHUB_CLIENT_SECRET: '${GITHUB_CLIENT_SECRET:-}'
      BEEHIIVE_API_KEY: '${BEEHIIVE_API_KEY:-}'
      BEEHIIVE_PUBLICATION_ID: '${BEEHIIVE_PUBLICATION_ID:-}'
      THREADS_APP_ID: '${THREADS_APP_ID:-}'
      THREADS_APP_SECRET: '${THREADS_APP_SECRET:-}'
      YOUTUBE_CLIENT_ID: '${YOUTUBE_CLIENT_ID:-}'
      YOUTUBE_CLIENT_SECRET: '${YOUTUBE_CLIENT_SECRET:-}'
      TIKTOK_CLIENT_ID: '${TIKTOK_CLIENT_ID:-}'
      TIKTOK_CLIENT_SECRET: '${TIKTOK_CLIENT_SECRET:-}'
      PINTEREST_CLIENT_ID: '${PINTEREST_CLIENT_ID:-}'
      PINTEREST_CLIENT_SECRET: '${PINTEREST_CLIENT_SECRET:-}'
      DRIBBBLE_CLIENT_ID: '${DRIBBBLE_CLIENT_ID:-}'
      DRIBBBLE_CLIENT_SECRET: '${DRIBBBLE_CLIENT_SECRET:-}'
      DISCORD_CLIENT_ID: '${DISCORD_CLIENT_ID:-}'
      DISCORD_CLIENT_SECRET: '${DISCORD_CLIENT_SECRET:-}'
      DISCORD_BOT_TOKEN_ID: '${DISCORD_BOT_TOKEN_ID:-}'
      SLACK_ID: '${SLACK_ID:-}'
      SLACK_SECRET: '${SLACK_SECRET:-}'
      SLACK_SIGNING_SECRET: '${SLACK_SIGNING_SECRET:-}'
      MASTODON_URL: '${MASTODON_URL:-https://mastodon.social}'
      MASTODON_CLIENT_ID: '${MASTODON_CLIENT_ID:-}'
      MASTODON_CLIENT_SECRET: '${MASTODON_CLIENT_SECRET:-}'
      OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
      NEXT_PUBLIC_DISCORD_SUPPORT: '${NEXT_PUBLIC_DISCORD_SUPPORT:-}'
      NEXT_PUBLIC_POLOTNO: '${NEXT_PUBLIC_POLOTNO:-}'
      API_LIMIT: 30
      EMAIL_PROVIDER: '${EMAIL_PROVIDER:-}'
      SMTP_HOST: '${SMTP_HOST:-}'
      SMTP_PORT: '${SMTP_PORT:-}'
      SMTP_USER: '${SMTP_USER:-}'
      SMTP_PASSWORD: '${SMTP_PASSWORD:-}'
      SMTP_FROM: '${SMTP_FROM:-}'
      FEE_AMOUNT: 0.05
      STRIPE_PUBLISHABLE_KEY: '${STRIPE_PUBLISHABLE_KEY:-}'
      STRIPE_SECRET_KEY: '${STRIPE_SECRET_KEY:-}'
      STRIPE_SIGNING_KEY: '${STRIPE_SIGNING_KEY:-}'
      STRIPE_SIGNING_KEY_CONNECT: '${STRIPE_SIGNING_KEY_CONNECT:-}'
      NX_ADD_PLUGINS: false
    volumes:
      - ./v19/postiz_config:/config
      - ./v19/postiz_uploads:/uploads
    ports:
      - "4007:5000"
    networks:
      - odoo_network_19

  # --------------------------------------------
  # Temporal Stack (configuración completa)
  # --------------------------------------------
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: temporal-elasticsearch
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - odoo_network_19
    expose:
      - 9200
    volumes:
      - ./v19/temporal_elasticsearch_data:/usr/share/elasticsearch/data

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: temporal
    depends_on:
      db:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_started
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: odoo
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: db
      POSTGRES_DB: temporal
      SERVICES: frontend,history,matching,worker
      TEMPORAL_BIND_ADDRESS: 0.0.0.0
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      ENABLE_ES: true
      ES_SEEDS: temporal-elasticsearch
      ES_VERSION: v7
      TEMPORAL_NAMESPACE: default
    networks:
      - odoo_network_19
    ports:
      - "7233:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "--address", "127.0.0.1:7233", "namespace", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    container_name: temporal-admin-tools
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - odoo_network_19
    depends_on:
      - temporal
    stdin_open: true
    tty: true

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:4007
    networks:
      - odoo_network_19
    ports:
      - "8180:8080"
    depends_on:
      - temporal

  spotlight:
    image: ghcr.io/getsentry/spotlight:latest
    container_name: spotlight
    pull_policy: always
    ports:
      - "8969:8969/tcp"
    networks:
      - odoo_network_19

networks:
  odoo_network_19:
    external: true
    name: odoo_network_19