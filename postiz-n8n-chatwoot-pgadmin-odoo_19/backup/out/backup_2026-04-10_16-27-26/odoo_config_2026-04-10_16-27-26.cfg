[options]
addons_path = ~/opt/odoo/odoo-from-13-to-18/arquitectura/odoo19/odoo/odoo/addons,~/opt/odoo/odoo-from-13-to-18/arquitectura/odoo19/clientes/integraia_19_delete/extra-addons/oca,~/opt/odoo/odoo-from-13-to-18/arquitectura/odoo19/clientes/integraia_19_delete/extra-addons/extra
#password de odoo, se puede cambiar por otro, pero es importante que sea seguro
admin_passwd = admin

#Se comunica con la base de datos de docker a traves del puerto 5432, y con el host
db_host = 0.0.0.0
db_port = 5432

db_user = integraia_19_delete
db_password = 123456
db_name = dbintegraia_19_delete
db_sslmode = prefer
db_template = template0
db_maxconn = 64

http_enable = True
http_interface = 127.0.0.1
http_port = 48069
gevent_port    = 48072      
#     ; ← este es el recomendado en vez de longpolling_port
#; O si quieres desactivar longpolling/gevent completamente (si no usas chat en tiempo real):
#; gevent_port = False
proxy_mode = True

workers = 2
max_cron_threads = 1

geoip_database = False



# ELIMINAR estas líneas - no son compatibles con Odoo 19
# longpolling_port = 8072
# longpolling_interface = 0.0.0.0
# websocket_port = 8072
# websocket_interface = 0.0.0.0
# websocket_keep_alive_timeout = 3600
# websocket_rate_limit_burst = 10
# websocket_rate_limit_delay = 0.2

server_wide_modules = base,web
# ELIMINAR esta línea - no es compatible
# http_keep_alive_timeout = 3600

limit_memory_hard = 1610612736
limit_memory_soft = 1073741824
limit_request = 8192
limit_time_cpu = 300
limit_time_real = 600
limit_time_real_cron = -1
logfile = ~/opt/odoo/odoo-from-13-to-18/arquitectura/odoo19/clientes/integraia_19_delete/log/odoo.log
log_level = debug
log_db = 
log_db_level = warning
log_handler = :WARNING,odoo.addons.base.models.ir_qweb:WARNING

# ELIMINAR esta línea - no es compatible
# web.base.url = https://jumpjibe.com

# Agregar estas líneas para mejor rendimiento
#por convencion deberia ser asi
data_dir = ~/opt/odoo/odoo-from-13-to-18/arquitectura/odoo19/clientes/integraia_19_delete/data